{% extends 'base.html' %}
{% block content %}
    <h2>Reset Password</h2>
    <form method="POST">
        {% if not user %}
            <p>Enter your username to find your account.</p>
            <input type="text" name="username" placeholder="Username" required>
            <button type="submit">FIND ACCOUNT</button>
        {% else %}
            <input type="hidden" name="username" value="{{ user.username }}">
            <p style="color: var(--accent-color);">Question: {{ user.security_question }}</p>
            <input type="text" name="security_answer" placeholder="Your Answer" required>
            <input type="password" name="new_password" placeholder="New Password (min 8 characters)" required>
            <button type="submit">RESET PASSWORD</button>
        {% endif %}
    </form>
    <br>
    <a href="{{ url_for('login') }}" style="color: var(--text-muted); font-size: 13px;">Return to Login</a>
{% endblock %}
