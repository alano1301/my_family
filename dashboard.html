{% extends 'base.html' %}
{% block content %}
    <div style="border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
        <h2 style="color: var(--accent-color);">Welcome, {{ username }}</h2>
        <p>Access your personalized developer tools and projects.</p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px;">
        <a href="{{ url_for('update_profile') }}" style="color: var(--text-main); text-decoration: none; border: 1px solid #444; padding: 10px; border-radius: 8px; transition: 0.3s;" onmouseover="this.style.borderColor='var(--accent-color)'" onmouseout="this.style.borderColor='#444'">
            ⚙️ Edit Profile Settings
        </a>
        
        <a href="{{ url_for('logout') }}" style="color: #e57373; text-decoration: none; font-size: 14px; margin-top: 10px;">
            Sign Out
        </a>
    </div>
{% endblock %}
